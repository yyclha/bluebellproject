      function normalizeAssistantStaticCopy() {

      function ready(fn) {

      function truncate(text, size) {
        if (!text) return "";
        if (text.length <= size) return text;
        return text.slice(0, size) + "...";
      }

      function escapeHTML(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function createAssistantId(prefix) {
        return [prefix || "msg", Date.now(), Math.random().toString(16).slice(2, 8)].join("-");
      }

      function buildWelcomeAssistantMessage() {
        return {
          id: createAssistantId("welcome"),
          role: "assistant",
          text: ASSISTANT_COPY.welcome,
          status: "done",
          sources: [],
          showSources: false
        };

      function normalizeAssistantMessage(message) {
        if (!message || (message.role !== "user" && message.role !== "assistant")) {
          return null;

        return {
          id: String(message.id || createAssistantId(message.role)),
          role: message.role,
          text: String(message.text || ""),
          status: message.status === "error" ? "error" : (message.status === "loading" ? "loading" : "done"),
          sources: Array.isArray(message.sources) ? message.sources.slice(0, 4) : [],
          showSources: !!message.showSources
        };
      }

      function ensureAssistantHistory() {
        if (!ragAssistantState.history.length) {
          ragAssistantState.history = [buildWelcomeAssistantMessage()];
        }
      }

      function trimAssistantHistory() {
        if (ragAssistantState.history.length > 24) {
          ragAssistantState.history = ragAssistantState.history.slice(ragAssistantState.history.length - 24);
        }
      }

      function persistAssistantState() {
        try {
          localStorage.setItem(RAG_ASSISTANT_STORAGE_KEY, JSON.stringify({
            unread: !!ragAssistantState.unread,
            history: ragAssistantState.history,
            position: ragAssistantState.position
          }));
        } catch (err) {
          return;
        }
      }

      function loadAssistantState() {
        try {
          var raw = localStorage.getItem(RAG_ASSISTANT_STORAGE_KEY);
          if (raw) {
            var saved = JSON.parse(raw);
            ragAssistantState.unread = !!(saved && saved.unread);
            ragAssistantState.history = Array.isArray(saved && saved.history)
              ? saved.history.map(normalizeAssistantMessage).filter(Boolean)
              : [];
            if (saved && saved.position && typeof saved.position.left === "number" && typeof saved.position.top === "number") {
              ragAssistantState.position = {
                left: saved.position.left,
                top: saved.position.top
              };
            }
          }
        } catch (err) {
          ragAssistantState.unread = false;
          ragAssistantState.history = [];
          ragAssistantState.position = null;
        }
        ensureAssistantHistory();
        trimAssistantHistory();
      }

      function getAssistantMetrics() {
        var mobile = window.innerWidth <= 768;
        return {
          mobile: mobile,
          fabSize: mobile ? 60 : 66,
          edge: mobile ? 12 : 16,
          panelGap: mobile ? 12 : 14,
          panelWidth: Math.min(390, Math.max(280, window.innerWidth - (mobile ? 24 : 28))),

      function getDefaultAssistantPosition() {
        var metrics = getAssistantMetrics();
        return {
          left: window.innerWidth - metrics.fabSize - metrics.edge,
          top: window.innerHeight - metrics.fabSize - (metrics.mobile ? 18 : 28)

      function normalizeAssistantPosition(position) {
        var metrics = getAssistantMetrics();
        var next = position && typeof position.left === "number" && typeof position.top === "number"
          ? position

        return {
          left: clamp(next.left, metrics.edge, Math.max(metrics.edge, window.innerWidth - metrics.fabSize - metrics.edge)),

        if (!fab || !panel) {

        metrics = getAssistantMetrics();
        position = normalizeAssistantPosition(ragAssistantState.position);
        panelLeft = clamp(
          position.left + metrics.fabSize - metrics.panelWidth,
          metrics.edge,
          Math.max(metrics.edge, window.innerWidth - metrics.panelWidth - metrics.edge)
        );
        panelTop = clamp(
          position.top - metrics.panelHeight - metrics.panelGap,
          metrics.topSafe,
          Math.max(metrics.topSafe, window.innerHeight - metrics.panelHeight - metrics.edge)
        );

        ragAssistantState.position = position;
        fab.style.left = position.left + "px";
        fab.style.top = position.top + "px";

          showSources: !!(options && options.showSources)

      function updateAssistantMessage(messageId, updater) {
        var i;
        for (i = ragAssistantState.history.length - 1; i >= 0; i -= 1) {

        if (ragAssistantState.typingTimer) {

        var node = document.querySelector('[data-rag-message-text="' + messageId + '"]');

        node.innerHTML = escapeHTML(text || "") + (withCaret ? '<span class="rag-answer-caret"></span>' : "");

        stopAssistantTyping();
        updateAssistantMessage(messageId, function (message) {
          message.text = String(text || "");
          message.status = options && options.status === "error" ? "error" : "done";
          message.sources = Array.isArray(sources) ? sources.slice(0, 4) : [];
          message.showSources = !!(options && options.showSources);

        if (ragAssistantState.view === "chat") {

      function getAssistantMessageText(messageId) {
        var i;
        for (i = ragAssistantState.history.length - 1; i >= 0; i -= 1) {

        ragAssistantState.typingTimer = window.setInterval(function () {
          cursor = Math.min(targetText.length, cursor + step);
          updateAssistantMessage(messageId, function (message) {
            message.text = targetText.slice(0, cursor);

        if (loginResult && loginResult.token) {

        }
        return headers;

      function requestJSON(url) {
        return fetch(url, {
          method: "GET",
          headers: getAuthHeaders()
        }).then(function (resp) {
          return resp.json();
        });
      }

      function postJSON(url, payload) {
        return fetch(url, {
          method: "POST",
          headers: Object.assign({
            "Content-Type": "application/json"
          }, getAuthHeaders()),
          body: JSON.stringify(payload)

          return resp.json();

      function createSSEParser(onEvent) {

          for (i = 0; i < blocks.length; i += 1) {

            var eventName = "message";
            var dataParts = [];
            if (!block) {

            lines = block.split(/\r?\n/);

                eventName = line.slice(6).trim() || "message";
              } else if (line.indexOf("data:") === 0) {
                dataParts.push(line.slice(5).trim());
              }
            }
            if (dataParts.length) {
              onEvent(eventName, dataParts.join("\n"));
            }
          }
        };
      }

      function streamAssistantQuestion(question, handlers) {
        var headers = Object.assign({
          "Content-Type": "application/json",
          "Accept": "text/event-stream"
        }, getAuthHeaders());

        return fetch("/api/v1/rag/chat/stream", {
          method: "POST",
          headers: headers,
          body: JSON.stringify({
            question: question,
            top_k: 4
          })
        }).then(function (resp) {
          var reader;
          var decoder;
          var parse;

          if (!resp.ok) {
            throw new Error("stream request failed with status " + resp.status);
          }
          if (!resp.body || !resp.body.getReader) {
            throw new Error("stream body is not supported");
          }

          reader = resp.body.getReader();
          decoder = new TextDecoder("utf-8");
          parse = createSSEParser(function (eventName, rawData) {
            var payload = {};
            if (rawData) {
              try {
                payload = JSON.parse(rawData);
              } catch (err) {
                payload = {};
              }
            }

            if (eventName === "chunk") {
              if (handlers && handlers.onChunk) {
                handlers.onChunk(String(payload.delta || ""));
              }
              return;
            }
            if (eventName === "done") {
              if (handlers && handlers.onDone) {
                handlers.onDone(payload);
              }
              return;
            }
            if (eventName === "error" && handlers && handlers.onError) {
              handlers.onError(String(payload.message || "问答失败"));
            }
          });

          function pump() {
            return reader.read().then(function (result) {
              if (result.done) {
                parse("", true);
                return;
              }
              parse(decoder.decode(result.value, { stream: true }), false);
              return pump();
            });
          }

          return pump();
        });
      }

      function beginAssistantDrag(event, source) {
        if (event.button != null && event.button !== 0) {
          return;
        }
        ragDragState.active = true;
        ragDragState.source = source;
        ragDragState.pointerId = event.pointerId;
        ragDragState.startX = event.clientX;
        ragDragState.startY = event.clientY;
        ragDragState.originLeft = normalizeAssistantPosition(ragAssistantState.position).left;
        ragDragState.originTop = normalizeAssistantPosition(ragAssistantState.position).top;
        ragDragState.moved = false;
        document.body.style.userSelect = "none";
        document.getElementById("rag-panel").classList.add("dragging");
        event.preventDefault();
      }

      function moveAssistantDrag(event) {
        if (!ragDragState.active) {
          return;
        }
        if (ragDragState.pointerId != null && event.pointerId != null && ragDragState.pointerId !== event.pointerId) {
          return;
        }
        if (Math.abs(event.clientX - ragDragState.startX) > 4 || Math.abs(event.clientY - ragDragState.startY) > 4) {
          ragDragState.moved = true;
        }
        ragAssistantState.position = normalizeAssistantPosition({
          left: ragDragState.originLeft + (event.clientX - ragDragState.startX),
          top: ragDragState.originTop + (event.clientY - ragDragState.startY)
        });
        applyAssistantLayout();
      }

      function endAssistantDrag(event) {
        var panel = document.getElementById("rag-panel");
        if (!ragDragState.active) {
          return;
        }
        if (ragDragState.pointerId != null && event.pointerId != null && ragDragState.pointerId !== event.pointerId) {
          return;
        }
        ragDragState.active = false;
        document.body.style.userSelect = "";
        if (panel) {
          panel.classList.remove("dragging");
        }
        persistAssistantState();
        if (ragDragState.source === "fab" && !ragDragState.moved) {
          togglePanel();
        }
      }

      function executeAssistantStream(input) {
        var question = (input.value || "").trim();
        var sendButton = document.getElementById("rag-send");
        var messageId;
        var receivedChunks = false;

        if (!question) {
          return;
        }
        if (ragAssistantState.loading && ragAssistantState.lastQuestion === question) {
          return;
        }

        ragAssistantState.loading = true;
        ragAssistantState.lastQuestion = question;
        if (sendButton) {
          sendButton.disabled = true;
          sendButton.textContent = ASSISTANT_COPY.sending;
        }
        messageId = renderAssistantLoading(question);
        input.value = "";

        function resetSendButton() {
          if (!sendButton) {
            return;
          }
          sendButton.disabled = false;
          sendButton.textContent = ASSISTANT_COPY.send;
        }

        streamAssistantQuestion(question, {
          onChunk: function (delta) {
            if (!receivedChunks) {
              receivedChunks = true;
              updateAssistantTitle(ASSISTANT_COPY.panelTitleStreaming);
              updateAssistantMessage(messageId, function (message) {
                message.text = "";
                message.status = "typing";
              });
              renderAssistantThread();
            }
            streamAssistantMessageChunk(messageId, delta);
          },
          onDone: function (payload) {
            ragAssistantState.loading = false;
            resetSendButton();
            finalizeAssistantMessage(
              messageId,
              payload && payload.answer ? String(payload.answer) : getAssistantMessageText(messageId),
              payload && payload.hits ? payload.hits : [],
              { showSources: true }
            );
            updateAssistantTitle(ASSISTANT_COPY.panelTitleDone);
          },
          onError: function (message) {
            ragAssistantState.loading = false;
            resetSendButton();
            renderAssistantError(messageId, message || ASSISTANT_COPY.panelTitleError);
          }
        }).catch(function () {
          ragAssistantState.loading = false;
          resetSendButton();
          renderAssistantError(messageId, ASSISTANT_COPY.answerError);
        });
      }

          .then(function (resp) {

      function refetchLoadedHomePages() {
        var order = homeFeedState.order || getCurrentPostOrder();
        var pageCount = homeFeedState.page > 0 ? homeFeedState.page : 1;
        var requests = [];
        var pageIndex;

        for (pageIndex = 1; pageIndex <= pageCount; pageIndex++) {
          requests.push(fetchHomePosts(pageIndex, order));
        }

        return Promise.all(requests).then(function (pages) {
          var merged = [];
          pages.forEach(function (items) {
            merged = merged.concat(items || []);
          });
          homeFeedState.order = order;
          homeFeedState.items = merged;
          homeFeedState.initialized = true;
          homeFeedState.reachedEnd = pages.length > 0 ? (pages[pages.length - 1] || []).length < homeFeedState.size : true;
          syncHomeFeedOrderUI(order);
          renderHomeFeedState();
          return merged.slice();
        });
      }

        options = options || {};
        var list = getHomeListNode();
        if (!list || homeFeedState.loading) {
          return Promise.resolve(homeFeedState.items.slice());
        }

        clearSearchResults();

        var requestedOrder = options.order || getCurrentPostOrder();
        if (options.preserveLoaded && homeFeedState.initialized && homeFeedState.page > 0 && homeFeedState.order === requestedOrder) {
          homeFeedState.loading = true;
          syncHomeFeedOrderUI(requestedOrder);
          renderHomeFeedState();
          return refetchLoadedHomePages()
            .finally(function () {
              homeFeedState.loading = false;
              renderHomeFeedState();
            });
        }

        var reset = !!options.reset || !homeFeedState.initialized || homeFeedState.order !== requestedOrder;

        if (reset) {
          homeFeedState.order = requestedOrder;
          homeFeedState.page = 1;
          homeFeedState.items = [];
          homeFeedState.reachedEnd = false;
        }

        homeFeedState.loading = true;
        syncHomeFeedOrderUI(requestedOrder);
        renderHomeFeedState();

        var nextPage = reset ? 1 : homeFeedState.page + 1;
        return fetchHomePosts(nextPage, requestedOrder)
          .then(function (data) {
            if (reset) {
              homeFeedState.items = data.slice();
            } else {
              homeFeedState.items = homeFeedState.items.concat(data);
            }
            homeFeedState.page = nextPage;
            homeFeedState.order = requestedOrder;
            homeFeedState.initialized = true;
            homeFeedState.reachedEnd = data.length < homeFeedState.size;
            syncHomeFeedOrderUI(requestedOrder);
            renderHomeFeedState();
            return homeFeedState.items.slice();
          })
          .finally(function () {
            homeFeedState.loading = false;
            renderHomeFeedState();
          });
      }

      function bindHomeFeedActions() {
        var searchToolbar = ensureHomeSearchToolbar();
        var footer = ensureHomeFeedFooter();
        var resetButton;
        var button;
        var list;
        if (!footer || !searchToolbar) {
          return;
        }

        resetButton = searchToolbar.querySelector(".home-search-reset");
        if (resetButton && resetButton.dataset.bound !== "1") {
          resetButton.dataset.bound = "1";
          resetButton.addEventListener("click", function () {
            var searchInput = document.querySelector(".s-input");
            clearSearchResults();
            if (searchInput) {
              searchInput.value = "";
            }
            refreshHomePostList({ reset: true });
          });
        }

        button = footer.querySelector(".home-feed-more");
        if (button && button.dataset.bound !== "1") {
          button.dataset.bound = "1";
          button.addEventListener("click", function () {
            refreshHomePostList();
          });
        }

        list = getHomeListNode();
        if (!list || list.dataset.homeOpenBound === "1") {
          return;
        }

        list.dataset.homeOpenBound = "1";
        list.addEventListener("click", function (event) {
          var item = event.target.closest(".c-l-item");
          if (!item || !list.contains(item)) {
            return;
          }
          if (event.target.closest(".post")) {
            return;
          }
          var postId = item.dataset.postId;
          if (!postId) {
            return;
          }
          window.location.href = "/post/" + encodeURIComponent(postId);
        });

        var header = document.querySelector(".c-l-header");
        if (header && header.dataset.feedSortBound !== "1") {
          header.dataset.feedSortBound = "1";
          header.addEventListener("click", function (event) {
            var orderButton = event.target.closest(".new, .top");
            if (!orderButton) {
              return;
            }
            event.preventDefault();
            var requestedOrder = orderButton.classList.contains("top") ? "score" : "time";
            if (homeFeedState.loading && homeFeedState.order === requestedOrder) {
              syncHomeFeedOrderUI(requestedOrder);
              return;
            }
            homeFeedState.order = requestedOrder;
            syncHomeFeedOrderUI(requestedOrder);
            refreshHomePostList({
              reset: true,
              order: requestedOrder
            });
          });
        }
      }

      function formatDetailDate(value) {
        if (!value) {
          return "";
        }
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return String(value);
        }
        return date.toLocaleDateString("zh-CN", {
          year: "numeric",
          month: "short",
          day: "numeric"
        });
      }

      function ensureCommentPanel() {
        if (document.getElementById("comment-panel")) {
          return document.getElementById("comment-panel");
        }
        var container = document.querySelector(".content .left .container");
        if (!container) {
          return null;
        }
        var panel = document.createElement("section");
        panel.id = "comment-panel";
        panel.className = "comment-panel";
        panel.innerHTML = [
          '<div class="comment-header">',
          '<div class="comment-title">评论</div>',
          '</div>',
          '<div class="comment-form">',
          '<textarea id="comment-input" class="comment-input" placeholder="写下你的评论..."></textarea>',
          '<div class="comment-actions">',
          '<button id="comment-submit" class="comment-submit" type="button">发表评论</button>',
          '</div>',
          '</div>',
          '<div id="comment-list" class="comment-list"></div>'
        ].join("");
        container.appendChild(panel);
        return panel;
      }

      function formatCommentTime(value) {
        if (!value) {
          return "";
        }
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return String(value);
        }
        return date.toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function renderCommentList(comments) {
        var list = document.getElementById("comment-list");
        if (!list) {
          return;
        }
        if (!comments || !comments.length) {
          list.innerHTML = '<div class="comment-empty">还没有评论，来发第一条吧。</div>';
          return;
        }
        list.innerHTML = comments.map(function (comment) {
          return [
            '<article class="comment-item">',
            '<div class="comment-meta">',
            '<span class="comment-author">' + escapeHTML(comment.author_name || "匿名") + '</span>',
            '<span>' + escapeHTML(formatCommentTime(comment.create_time)) + '</span>',
            '</div>',
            '<div class="comment-content">' + escapeHTML(comment.content || "") + '</div>',
            '</article>'
          ].join("");
        }).join("");
      }

      function loadComments(postId) {
        requestJSON("/api/v1/post/" + encodeURIComponent(postId) + "/comments")
          .then(function (resp) {
            if (!resp || resp.code !== 1000) {
              renderCommentList([]);
              return;
            }
            renderCommentList(resp.data || []);
          })
          .catch(function () {
            renderCommentList([]);
          });
      }

      function bindCommentSubmit(postId) {
        var button = document.getElementById("comment-submit");
        var input = document.getElementById("comment-input");
        if (!button || !input || button.dataset.boundPostId === String(postId)) {
          return;
        }

        button.dataset.boundPostId = String(postId);
        button.onclick = function () {
          var loginResult = getLoginResult();
          if (!loginResult || !loginResult.token) {
            showVoteMessage("请先登录后再评论");
            return;
          }

          var content = (input.value || "").trim();
          if (!content) {
            showVoteMessage("评论内容不能为空");
            return;
          }

          button.disabled = true;
          postJSON("/api/v1/comment", {
            post_id: String(postId),
            content: content
          }).then(function (resp) {
            if (!resp || resp.code !== 1000) {
              showVoteMessage(resp && resp.msg ? resp.msg : "发表评论失败，请稍后重试");
              return;
            }
            input.value = "";
            loadComments(postId);
          }).catch(function () {
            showVoteMessage("发表评论失败，请稍后重试");
          }).finally(function () {
            button.disabled = false;
          });
        };
      }

      function ensureDetailDeleteButton() {
        var actions = document.querySelector(".content .left .container .l-container .user-btn");
        if (!actions) {
          return null;
        }
        var button = document.getElementById("detail-delete-btn");
        if (button) {
          return button;
        }
        button = document.createElement("button");
        button.id = "detail-delete-btn";
        button.className = "detail-delete-btn";
        button.type = "button";
        button.textContent = "删除帖子";
        button.style.display = "none";
        actions.appendChild(button);
        return button;
      }

      function bindDetailDelete(postId, post) {
        var button = ensureDetailDeleteButton();
        if (!button) {
          return;
        }

        var loginResult = getLoginResult();
        var canDelete = !!(loginResult && loginResult.token);
        button.style.display = canDelete ? "inline-flex" : "none";
        if (!canDelete || button.dataset.boundPostId === String(postId)) {
          return;
        }

        button.dataset.boundPostId = String(postId);
        button.onclick = function () {
          if (!window.confirm("确认删除这篇帖子吗？删除后无法恢复。")) {
            return;
          }

          button.disabled = true;
          deleteJSON("/api/v1/post/" + encodeURIComponent(postId))
            .then(function (resp) {
              if (!resp || resp.code !== 1000) {
                showVoteMessage(resp && resp.msg ? resp.msg : "删除帖子失败，请稍后重试");
                return;
              }
              window.location.href = "/";
            })
            .catch(function () {
              showVoteMessage("删除帖子失败，请稍后重试");
            })
            .finally(function () {
              button.disabled = false;
            });
        };
      }

      function syncPostDetail() {
        var match = window.location.pathname.match(/^\/post\/([^/]+)$/);
        if (!match) {
          return;
        }

        requestJSON("/api/v1/post/" + encodeURIComponent(match[1]))
          .then(function (resp) {
            if (!resp || resp.code !== 1000 || !resp.data) {
              return;
            }

            var post = resp.data;
            var voteNum = document.querySelector(".content .left .post .text");
            if (voteNum) {
              voteNum.textContent = post.vote_num != null ? post.vote_num : 0;
            }

            var title = document.querySelector(".content .left .con-title");
            if (title && post.title) {
              title.textContent = post.title;
            }

            var content = document.querySelector(".content .left .con-info");
            if (content && typeof post.content === "string") {
              content.textContent = post.content;
            }

            var topicName = document.querySelector(".content .right .topic-name");
            if (topicName) {
              topicName.textContent = post.author_name || "";
            }

            var topicDesc = document.querySelector(".content .right .t-desc");
            if (topicDesc) {
              if (post.community && post.community.name) {
                topicDesc.textContent = "社区: " + post.community.name;
              } else {
                topicDesc.textContent = "";
              }
            }

            var statNumbers = document.querySelectorAll(".content .right .t-num .number");
            var statUnits = document.querySelectorAll(".content .right .t-num .unit");
            if (statNumbers.length > 0) {
              statNumbers[0].textContent = post.vote_num != null ? String(post.vote_num) : "0";
            }
            if (statUnits.length > 0) {
              statUnits[0].textContent = "赞同";
            }
            if (statNumbers.length > 1) {
              statNumbers[1].textContent = post.community && post.community.id != null ? String(post.community.id) : "-";
            }
            if (statUnits.length > 1) {
              statUnits[1].textContent = "社区 ID";
            }

            var date = document.querySelector(".content .right .date");
            if (date) {
              var formatted = formatDetailDate(post.create_time);
              date.textContent = formatted ? "发布时间: " + formatted : "";
            }

            bindDetailDelete(match[1], post);

            if (ensureCommentPanel()) {
              loadComments(match[1]);
              bindCommentSubmit(match[1]);
            }
          })
          .catch(function () {
            return null;
          });
      }

      function showVoteMessage(message) {
        if (!message) {
          return;
        }
        window.alert(message);
      }

      function handleVoteClick(icon, direction) {
        var listItem = icon.closest(".c-l-item");
        if (!listItem) {
          return;
        }
        var postId = listItem.dataset.postId;
        if (!postId) {
          refreshHomePostList().then(function (posts) {
            var items = getHomePostItems();
            var index = items.indexOf(listItem);
            if (index === -1 || !posts[index]) {
              showVoteMessage("未找到对应帖子，刷新后重试");
              return;
            }
            submitVote(String(posts[index].id), direction);
          });
          return;
        }
        submitVote(postId, direction);
      }

      function submitVote(postId, direction) {
        var loginResult = getLoginResult();
        if (!loginResult || !loginResult.token) {
          showVoteMessage("请先登录后再投票");
          return;
        }
        postJSON("/api/v1/vote", {
          post_id: postId,
          direction: String(direction)
        }).then(function (resp) {
          if (!resp || resp.code !== 1000) {
            showVoteMessage(resp && resp.msg ? resp.msg : "投票失败，请稍后重试");
            return;
          }
          refreshHomePostList();
          bindDynamicSidebar(true);
        }).catch(function () {
          showVoteMessage("投票失败，请稍后重试");
        });
      }

      function getKnownVoteDirection(postId) {
        postId = String(postId);
        if (!Object.prototype.hasOwnProperty.call(voteStateByPost, postId)) {
          return null;
        }
        return voteStateByPost[postId];
      }

      function setKnownVoteDirection(postId, direction) {
        voteStateByPost[String(postId)] = direction;
      }

      function isRepeatedVoteResponse(resp) {
        if (!resp || resp.code === 1000 || !resp.msg) {
          return false;
        }
        var msg = String(resp.msg).toLowerCase();
        return msg.indexOf("repeat") !== -1 || msg.indexOf("重复") !== -1;
      }

      function sendVoteRequest(postId, direction) {
        return postJSON("/api/v1/vote", {
          post_id: String(postId),
          direction: String(direction)
        });
      }

      function showVoteMessage(message) {
        if (!message) {
          return;
        }
        window.alert(message);
      }

      function handleVoteClick(icon, direction) {
        var listItem = icon.closest(".c-l-item");
        if (!listItem) {
          return;
        }
        var postId = listItem.dataset.postId;
        if (!postId) {
          refreshHomePostList().then(function (posts) {
            var items = getHomePostItems();
            var index = items.indexOf(listItem);
            if (index === -1 || !posts[index]) {
              showVoteMessage("未找到对应帖子，刷新后重试");
              return;
            }
            submitVote(String(posts[index].id), direction);
          });
          return;
        }
        submitVote(postId, direction);
      }

      function submitVote(postId, direction, options) {
        options = options || {};
        postId = String(postId);
        var loginResult = getLoginResult();
        if (!loginResult || !loginResult.token) {
          showVoteMessage("请先登录后再投票");
          return;
        }
        if (votePendingByPost[postId]) {
          return;
        }

        var knownDirection = getKnownVoteDirection(postId);
        var submitDirection = options.overrideDirection;
        if (typeof submitDirection !== "number") {
          submitDirection = knownDirection === direction ? 0 : direction;
        }

        votePendingByPost[postId] = true;

        sendVoteRequest(postId, submitDirection)
          .then(function (resp) {
            if (resp && resp.code === 1000) {
              setKnownVoteDirection(postId, submitDirection);
              refreshHomePostList({ preserveLoaded: true });
              bindDynamicSidebar(true);
              return;
            }

            if (!options.isRetry && submitDirection !== 0 && isRepeatedVoteResponse(resp)) {
              votePendingByPost[postId] = false;
              submitVote(postId, direction, {
                overrideDirection: 0,
                isRetry: true
              });
              return;
            }

            showVoteMessage(resp && resp.msg ? resp.msg : "投票失败，请稍后重试");
          })
          .catch(function () {
            showVoteMessage("投票失败，请稍后重试");
          })
          .finally(function () {
            votePendingByPost[postId] = false;
          });
      }

      function bindVoteActions() {
        if (document.body.dataset.voteBound === "1") {
          return;
        }
        document.body.dataset.voteBound = "1";
        document.addEventListener("click", function (event) {
          var upIcon = event.target.closest(".c-l-list .icon-up");
          if (upIcon) {
            event.preventDefault();
            event.stopPropagation();
            handleVoteClick(upIcon, 1);
            return;
          }

          var downIcon = event.target.closest(".c-l-list .icon-down");
          if (downIcon) {
            event.preventDefault();
            event.stopPropagation();
            handleVoteClick(downIcon, -1);
          }
        }, true);
      }

      ready(function () {
        var fab = document.getElementById("rag-fab");
        var header = document.getElementById("rag-header");
        var close = document.getElementById("rag-close");
        var minimize = document.getElementById("rag-minimize");
        var assistantInput = document.getElementById("rag-input");
        var assistantSend = document.getElementById("rag-send");
        loadAssistantState();
        normalizeAssistantStaticCopy();
        renderAssistantThread();
        applyAssistantLayout();
        updateAssistantBadge();
        if (fab) {
          fab.addEventListener("pointerdown", function (event) {
            beginAssistantDrag(event, "fab");
          });
        }
        if (header) {
          header.addEventListener("pointerdown", function (event) {
            if (event.target.closest("button")) {
              return;
            }
            beginAssistantDrag(event, "header");
          });
        }
        window.addEventListener("pointermove", moveAssistantDrag);
        window.addEventListener("pointerup", endAssistantDrag);
        window.addEventListener("pointercancel", endAssistantDrag);
        window.addEventListener("resize", function () {
          applyAssistantLayout();
        });
        if (close) {
          close.addEventListener("click", hidePanel);
        }
        if (minimize) {
          minimize.addEventListener("click", hidePanel);
        }
        if (assistantSend && assistantInput) {
          assistantSend.addEventListener("click", function () {
            executeAssistantStream(assistantInput);
          });
        }
        if (assistantInput) {
          assistantInput.addEventListener("keydown", function (event) {
            if (event.key !== "Enter" || event.shiftKey) {
              return;
            }
            event.preventDefault();
            executeAssistantStream(assistantInput);
          });
        }

        document.addEventListener("click", function (event) {
          var panel = document.getElementById("rag-panel");
          var input = document.querySelector(".s-input");
          var search = document.querySelector(".search");
          var fabButton = document.getElementById("rag-fab");
          if (!panel || !panel.classList.contains("show")) {
            return;
          }
          if (panel.contains(event.target) || (fabButton && fabButton.contains(event.target)) || (input && input.contains(event.target)) || (search && search.contains(event.target))) {
            return;
          }
          hidePanel();
        });

        bindSearch();
        bindDynamicSidebar();
        bindHomeFeedActions();
        bindVoteActions();
        syncPostDetail();
        refreshHomePostList({ reset: true });
        var timer = setInterval(function () {
          bindSearch();
          bindDynamicSidebar(needsSidebarReplacement(document.querySelector('.content .right[data-v-2baf73fc]')));
          bindHomeFeedActions();
          syncPostDetail();
        }, 800);
        window.addEventListener("beforeunload", function () {
          clearInterval(timer);
        });
      });
    })();
  </script>
</body>
</html>
