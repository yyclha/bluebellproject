<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico">
  <title>YXB GameBase</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-soft: #f0f3f8;
      --surface-strong: #111827;
      --line: #d9e0ea;
      --line-strong: #b8c2cf;
      --text: #141823;
      --muted: #667085;
      --muted-strong: #475467;
      --primary: #0f766e;
      --primary-strong: #115e59;
      --blue: #2563eb;
      --amber: #c77700;
      --red: #c2413a;
      --green-soft: #e7f5f2;
      --blue-soft: #eaf1ff;
      --amber-soft: #fff3d8;
      --red-soft: #fae8e6;
      --shadow: 0 18px 44px rgba(31, 41, 55, 0.10);
      --shadow-sm: 0 8px 22px rgba(31, 41, 55, 0.08);
      --radius: 8px;
      --header-h: 68px;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.is-locked {
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.64;
    }

    a {
      color: inherit;
    }

    :focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.34);
      outline-offset: 3px;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--header-h);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      width: min(1280px, calc(100% - 32px));
      height: 100%;
      margin: 0 auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 196px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0;
      text-align: left;
    }

    .brand img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: var(--shadow-sm);
    }

    .brand-sub {
      display: block;
      margin-top: -2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 560px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 42px;
      padding: 0 14px 0 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow-sm);
    }

    .btn-primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      border-color: var(--primary-strong);
      background: var(--primary-strong);
    }

    .btn-danger {
      border-color: rgba(194, 65, 58, 0.22);
      background: var(--red-soft);
      color: var(--red);
    }

    .btn-ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted-strong);
      box-shadow: none;
    }

    .btn-icon {
      width: 42px;
      padding: 0;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted-strong);
      font-weight: 700;
    }

    .user-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--primary);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 320px;
      gap: 22px;
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .sidebar,
    .rightbar {
      position: sticky;
      top: calc(var(--header-h) + 20px);
      align-self: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .panel + .panel {
      margin-top: 16px;
    }

    .panel-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.4;
    }

    .panel-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .domains {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .domain-btn {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      width: 100%;
      min-height: 58px;
      padding: 9px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .domain-btn:hover,
    .domain-btn.is-active {
      border-color: rgba(15, 118, 110, 0.22);
      background: var(--green-soft);
    }

    .domain-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--primary-strong);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .domain-btn:nth-child(3n + 1) .domain-mark {
      background: var(--green-soft);
      color: var(--primary-strong);
    }

    .domain-btn:nth-child(3n + 2) .domain-mark {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .domain-btn:nth-child(3n + 3) .domain-mark {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .domain-name {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .domain-desc {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main {
      min-width: 0;
    }

    .main-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .section-kicker {
      margin: 0 0 4px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
    }

    .section-desc {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .segmented {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .segmented button {
      min-height: 34px;
      padding: 0 12px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted-strong);
      font-weight: 800;
    }

    .segmented button.is-active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 3px 10px rgba(31, 41, 55, 0.08);
    }

    .post-list {
      display: grid;
      gap: 14px;
    }

    .post-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .vote-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      border-right: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .vote-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted-strong);
    }

    .vote-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .vote-count {
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .post-body {
      min-width: 0;
      padding: 18px 20px 17px;
    }

    .post-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--primary-strong);
      font-size: 12px;
      font-weight: 900;
    }

    .post-title {
      margin: 0;
      color: var(--text);
      font-size: 20px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: 0;
    }

    .post-title button {
      display: inline;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
    }

    .post-title button:hover {
      color: var(--primary);
    }

    .post-excerpt {
      display: -webkit-box;
      margin: 10px 0 0;
      overflow: hidden;
      color: var(--muted-strong);
      font-size: 14px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }

    .post-thumb {
      position: relative;
      display: block;
      width: min(260px, 100%);
      margin-top: 12px;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      cursor: pointer;
      aspect-ratio: 16 / 9;
    }

    .post-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-thumb span {
      position: absolute;
      right: 8px;
      bottom: 8px;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.78);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
    }

    .empty,
    .loading {
      padding: 34px 18px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
    }

    .stat {
      padding: 12px;
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .stat-value {
      display: block;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.2;
    }

    .stat-label {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .assistant-box {
      padding: 14px;
    }

    .assistant-output {
      min-height: 92px;
      max-height: 220px;
      margin-bottom: 10px;
      padding: 12px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--muted-strong);
      font-size: 13px;
      white-space: pre-wrap;
    }

    .assistant-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .assistant-row input {
      min-width: 0;
      height: 40px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .detail,
    .form-page,
    .auth-page {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .detail-head,
    .form-head,
    .auth-head {
      padding: 22px;
      border-bottom: 1px solid var(--line);
    }

    .detail-content,
    .form-body,
    .auth-body {
      padding: 22px;
    }

    .detail-title {
      margin: 10px 0 0;
      font-size: 32px;
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: 0;
    }

    .detail-text {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.85;
      white-space: pre-wrap;
    }

    .detail-text img {
      display: block;
      max-width: 100%;
      max-height: 640px;
      margin: 14px 0;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: var(--shadow-sm);
    }

    .detail-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .comments {
      margin-top: 22px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .comments h3 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .comment-form {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .comment-form textarea,
    .field textarea,
    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }

    .comment-form textarea,
    .field textarea {
      min-height: 118px;
      padding: 12px;
      resize: vertical;
    }

    .field input,
    .field select {
      height: 44px;
      padding: 0 12px;
    }

    .comment-list {
      display: grid;
      gap: 10px;
    }

    .comment-item {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .comment-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .comment-author {
      color: var(--text);
      font-weight: 900;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .form-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .upload-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .upload-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .upload-preview:empty {
      display: none;
    }

    .upload-preview {
      display: grid;
      gap: 10px;
    }

    .upload-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .upload-preview-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 10px;
    }

    .upload-preview-item {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .upload-preview-item img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    .upload-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.72);
      color: #fff;
      cursor: pointer;
    }

    .upload-name {
      display: block;
      padding: 8px;
      overflow: hidden;
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .auth-page {
      max-width: 520px;
      margin: 0 auto;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 80;
      display: none;
      max-width: min(420px, calc(100vw - 40px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-strong);
      color: #fff;
      box-shadow: var(--shadow);
      font-size: 14px;
      font-weight: 700;
    }

    .toast.show {
      display: block;
    }

    .mobile-domain-strip {
      display: none;
      width: min(1280px, calc(100% - 32px));
      margin: 14px auto 0;
      overflow-x: auto;
      gap: 8px;
      scrollbar-width: none;
    }

    .mobile-domain-strip::-webkit-scrollbar {
      display: none;
    }

    .mobile-domain-strip .domain-chip {
      flex: 0 0 auto;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted-strong);
      font-weight: 800;
    }

    .mobile-domain-strip .domain-chip.is-active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    @media (max-width: 1120px) {
      .layout {
        grid-template-columns: 230px minmax(0, 1fr);
      }

      .rightbar {
        display: none;
      }
    }

    @media (max-width: 820px) {
      :root {
        --header-h: auto;
      }

      .topbar {
        position: static;
        height: auto;
      }

      .topbar-inner {
        flex-wrap: wrap;
        width: min(100% - 24px, 720px);
        padding: 12px 0;
      }

      .brand {
        min-width: 0;
      }

      .search-wrap {
        order: 3;
        max-width: none;
        flex-basis: 100%;
      }

      .topbar-actions {
        margin-left: auto;
      }

      .layout {
        display: block;
        width: min(100% - 24px, 720px);
        padding-top: 14px;
      }

      .sidebar {
        display: none;
      }

      .mobile-domain-strip {
        display: flex;
      }

      .main-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .section-title {
        font-size: 24px;
      }
    }

    @media (max-width: 560px) {
      .topbar-actions .user-pill,
      .topbar-actions .btn-ghost {
        display: none;
      }

      .post-card {
        grid-template-columns: 1fr;
      }

      .vote-box {
        flex-direction: row;
        justify-content: flex-start;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .post-body,
      .detail-head,
      .detail-content,
      .form-head,
      .form-body,
      .auth-head,
      .auth-body {
        padding: 16px;
      }

      --blue: #60a5fa;
      --amber: #fbbf24;
      --red: #fb7185;
      --green-soft: rgba(34, 211, 238, 0.12);

      function parseRoute() {
        var path = window.location.pathname;
        var match = path.match(/^\/post\/([^/]+)$/);
        if (match) {
          return { name: "detail", id: decodeURIComponent(match[1]) };
        }
        if (path === "/publish") {
          return { name: "publish" };
        }
        if (path === "/login") {
          return { name: "login" };
        }
        if (path === "/signup") {
          return { name: "signup" };
        }
        return { name: "home" };
      }

      function navigate(path) {
        window.history.pushState({}, "", path);
        state.route = parseRoute();
        if (state.route.name !== "publish") {
          state.publishImages = [];
        }
        render();
        loadRouteData();
      }

      function readLogin() {
        try {
          return JSON.parse(localStorage.getItem("loginResult")) || null;
        } catch (err) {
          return null;
        }
      }

      function setLogin(data) {
        localStorage.setItem("loginResult", JSON.stringify(data));
        state.auth = data;
      }

      function logout() {
        localStorage.removeItem("loginResult");
        state.auth = null;
        toast("已退出登录");
        navigate("/");
      }

      function authHeaders() {
        var headers = { "Content-Type": "application/json" };
        if (state.auth && state.auth.token) {
          headers.Authorization = "Bearer " + state.auth.token;
        }
        return headers;
      }

      function requestJSON(path, options) {
        options = options || {};
        options.headers = Object.assign(authHeaders(), options.headers || {});
        return fetch(API + path, options)
          .then(function (resp) { return resp.json(); })
          .then(function (payload) {
            if (!payload || payload.code !== 1000) {
              throw new Error(payload && payload.msg ? formatMsg(payload.msg) : "请求失败");
            }
            return payload.data;
          });
      }

      function formatMsg(msg) {
        if (typeof msg === "string") {
          return msg;
        }
        try {
          return Object.values(msg).join("；");
        } catch (err) {
          return "请求失败";
        }
      }

      function escapeHTML(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function imageMarkdownRegExp() {
        return /!\[([^\]\n]*)\]\((https?:\/\/[^\s)]+)\)/g;
      }

      function extractImages(value) {
        var images = [];
        var text = String(value == null ? "" : value);
        var imageRe = imageMarkdownRegExp();
        var match;
        while ((match = imageRe.exec(text)) !== null) {
          images.push({ name: match[1] || "帖子图片", url: match[2] });
        }
        return images;
      }

      function stripImageMarkdown(value) {
        return String(value == null ? "" : value).replace(imageMarkdownRegExp(), " ");
      }

      function renderContent(value) {
        var text = String(value == null ? "" : value);
        var imageRe = imageMarkdownRegExp();
        var html = "";
        var lastIndex = 0;
        var match;
        while ((match = imageRe.exec(text)) !== null) {
          html += escapeHTML(text.slice(lastIndex, match.index));
          html += '<img src="' + escapeHTML(match[2]) + '" alt="' + escapeHTML(match[1] || "帖子图片") + '" loading="lazy">';
          lastIndex = imageRe.lastIndex;
        }
        html += escapeHTML(text.slice(lastIndex));
        return html;
      }

      function normalizeID(value) {
        if (value == null || value === "") {
          return 0;
        }
        return Number(value);
      }

      function getCommunityName(id) {
        id = normalizeID(id);
        var found = state.communities.find(function (item) { return normalizeID(item.id) === id; });
        return found ? found.name : "领域";
      }

      function getActiveCommunity() {
        if (!state.selectedCommunityID) {
          return null;
        }
        return state.communities.find(function (item) {
          return normalizeID(item.id) === state.selectedCommunityID;
        }) || null;
      }

      function isTFTCommunity(community) {
        return !!(community && /云顶|金铲铲|tft/i.test(String(community.name || "")));
      }

      function domainInitial(name) {
        name = String(name || "");
        if (/云顶|金铲铲|tft/i.test(name)) {
          return "TFT";
        }
        if (/leetcode/i.test(name) || name === "力扣") {
          return "LC";
        }
        if (/cross|cf|穿越/i.test(name)) {
          return "CF";
        }
        if (/lol|英雄/i.test(name)) {
          return "LOL";
        }
        return name.slice(0, 2).toUpperCase() || "ALL";
      }

      function formatDate(value) {
        if (!value) {
          return "";
        }
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return String(value);
        }
        return date.toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function excerpt(text) {
        text = stripImageMarkdown(text).replace(/\s+/g, " ").trim();
        return text.length > 180 ? text.slice(0, 180) + "..." : text;
      }

      function toast(message) {
        var el = document.getElementById("toast");
        if (!el) {
          return;
        }
        el.textContent = message;
        el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          el.classList.remove("show");
        }, 2600);
      }

      function visiblePosts() {
        var q = state.query.trim().toLowerCase();
        if (!q) {
          return state.posts;
        }
        return state.posts.filter(function (post) {
          return String(post.title || "").toLowerCase().indexOf(q) !== -1 ||
            String(post.content || "").toLowerCase().indexOf(q) !== -1 ||
            String(post.author_name || "").toLowerCase().indexOf(q) !== -1 ||
            String(post.community && post.community.name || "").toLowerCase().indexOf(q) !== -1;
        });
      }

          '<article id="tft-items"><span>装备理解</span><strong>主 C 装优先</strong><p>按物理、法系、坦克三类记录散件消化和替代装。</p></article>',
          '<article><span>运营节奏</span><strong>连胜保血</strong><p>用帖子复盘沉淀什么时候提速、慢 D、上九和换站位。</p></article>',
          '</div>'
        ].join("");
      }

      function renderPostList(posts) {
        if (!posts.length) {
          return '<div class="empty">这个频道还没有话题。发布第一条攻略、组队或题解。</div>';
        }
        return '<section class="post-list">' + posts.map(renderPostCard).join("") + '</section>';
      }

      function renderPostCard(post) {
        var community = post.community || {};
        var images = extractImages(post.content);
        var cleanExcerpt = excerpt(post.content);
        return [
          '<article class="post-card">',
          '<div class="vote-box">',
          '<button class="vote-btn" data-vote="1" data-post-id="' + escapeHTML(post.id) + '" aria-label="赞同">' + icon("up") + '</button>',
          '<span class="vote-count">' + escapeHTML(post.vote_num || 0) + '</span>',
          '<button class="vote-btn" data-vote="-1" data-post-id="' + escapeHTML(post.id) + '" aria-label="反对">' + icon("down") + '</button>',
          '</div>',
          '<div class="post-body">',
          '<div class="post-meta">',
          '<span class="tag">' + escapeHTML(community.name || getCommunityName(post.community_id)) + '</span>',
          '<span>' + escapeHTML(post.author_name || "玩家") + '</span>',
          '<span>' + escapeHTML(formatDate(post.create_time)) + '</span>',
          '</div>',
          '<h2 class="post-title"><button data-open-post="' + escapeHTML(post.id) + '">' + escapeHTML(post.title || "未命名帖子") + '</button></h2>',
          cleanExcerpt ? '<p class="post-excerpt">' + escapeHTML(cleanExcerpt) + '</p>' : '',
          renderPostThumb(post.id, images),
          '<div class="post-actions">',
          '<button class="link-btn" data-open-post="' + escapeHTML(post.id) + '">进入讨论</button>',
          '<span class="post-meta">热度 ' + escapeHTML(post.vote_num || 0) + '</span>',
          '</div>',
          '</div>',
          '</article>'
        ].join("");
      }

      function renderPostThumb(postID, images) {
        if (!images.length) {
          return "";
        }
        return [
          '<button class="post-thumb" data-open-post="' + escapeHTML(postID) + '" aria-label="查看帖子图片">',
          '<img src="' + escapeHTML(images[0].url) + '" alt="' + escapeHTML(images[0].name || "帖子图片") + '" loading="lazy">',
          images.length > 1 ? '<span>+' + escapeHTML(images.length - 1) + '</span>' : '',
          '</button>'
        ].join("");
      }

      function renderDetail() {
        if (state.loading || !state.post) {
          return '<div class="loading">正在加载帖子详情...</div>';
        }
        var post = state.post;
        var community = post.community || {};
        var isAuth = !!(state.auth && state.auth.token);
        return [
          '<article class="detail">',
          '<div class="detail-head">',
          '<button class="btn btn-ghost" data-action="home">' + icon("back") + '<span>返回列表</span></button>',
          '<div class="post-meta" style="margin-top:14px">',
          '<span class="tag">' + escapeHTML(community.name || getCommunityName(post.community_id)) + '</span>',
          '<span>' + escapeHTML(post.author_name || "玩家") + '</span>',
          '<span>' + escapeHTML(formatDate(post.create_time)) + '</span>',
          '</div>',
          '<h1 class="detail-title">' + escapeHTML(post.title || "未命名帖子") + '</h1>',
          '<div class="detail-actions">',
          '<button class="btn" data-vote="1" data-post-id="' + escapeHTML(post.id) + '">' + icon("up") + '<span>赞同 ' + escapeHTML(post.vote_num || 0) + '</span></button>',
          '<button class="btn" data-vote="-1" data-post-id="' + escapeHTML(post.id) + '">' + icon("down") + '<span>反对</span></button>',
          isAuth ? '<button class="btn btn-danger" data-action="delete-post" data-post-id="' + escapeHTML(post.id) + '">' + icon("trash") + '<span>删除</span></button>' : '',
          '</div>',
          '</div>',
          '<div class="detail-content">',
          '<div class="detail-text">' + renderContent(post.content || "") + '</div>',
          renderComments(isAuth),
          '</div>',
          '</article>'
        ].join("");
      }

      function renderComments(isAuth) {
        return [
          '<section class="comments">',
          '<h3>评论</h3>',
          isAuth ? [
            '<div class="comment-form">',
            '<textarea id="comment-input" placeholder="写下你的观点，补充攻略、经验或题解。"></textarea>',
            '<div><button class="btn btn-primary" data-action="comment">发表评论</button></div>',
            '</div>'
          ].join("") : '<div class="empty" style="padding:18px">登录后可以发表评论。</div>',
          '<div class="comment-list">',
          state.comments.length ? state.comments.map(function (comment) {
            return [
              '<article class="comment-item">',
              '<div class="comment-meta"><span class="comment-author">' + escapeHTML(comment.author_name || "玩家") + '</span><span>' + escapeHTML(formatDate(comment.create_time)) + '</span></div>',
              '<div>' + escapeHTML(comment.content || "") + '</div>',
              '</article>'
            ].join("");
          }).join("") : '<div class="empty" style="padding:18px">还没有评论。</div>',
          '</div>',
          '</section>'
        ].join("");
      }

      function renderPublish() {
        if (!(state.auth && state.auth.token)) {
          setTimeout(function () { navigate("/login"); }, 0);
          return '<div class="loading">请先登录...</div>';
        }
        return [
          '<section class="form-page">',
          '<div class="form-head">',
          '<p class="section-kicker">Create</p>',
          '<h1 class="section-title">发布新讨论</h1>',
          '<p class="section-desc">选择领域后发布，帖子会自动参与该领域筛选。</p>',
          '</div>',
          '<form class="form-body" id="publish-form">',
          '<div class="form-grid">',
          '<div class="field"><label for="publish-community">领域</label><select id="publish-community" required>',
          state.communities.map(function (item) {
            return '<option value="' + escapeHTML(item.id) + '"' + (state.selectedCommunityID === normalizeID(item.id) ? " selected" : "") + '>' + escapeHTML(item.name) + '</option>';
          }).join(""),
          '</select></div>',
          '<div class="field"><label for="publish-title">标题</label><input id="publish-title" maxlength="128" required placeholder="一句话说清你的讨论主题"></div>',
          '<div class="field"><label for="publish-content">内容</label><textarea id="publish-content" placeholder="描述你的问题、攻略、战术、题解或复盘。图片会在下方预览。"></textarea></div>',
          '<div class="upload-row">',
          '<input class="sr-only" id="publish-image" type="file" accept="image/jpeg,image/png,image/webp,image/gif">',
          '<button class="btn" type="button" data-action="choose-image">' + icon("image") + '<span>上传图片</span></button>',
          '<span class="upload-hint">支持 jpg、png、webp、gif，大小限制由后端配置控制。</span>',
          '</div>',
          renderPublishImagePreview(),
          '</div>',
          '<div class="form-actions"><button class="btn" type="button" data-action="home">取消</button><button class="btn btn-primary" type="submit">发布帖子</button></div>',
          '</form>',
          '</section>'
        ].join("");
      }

      function renderPublishImagePreview() {
        return '<div class="upload-preview" id="publish-image-preview">' + renderPublishImagePreviewContent() + '</div>';
      }

      function renderPublishImagePreviewContent() {
        if (!state.publishImages.length) {
          return "";
        }
        return [
          '<div class="upload-preview-head"><span>已上传图片</span><span>' + escapeHTML(state.publishImages.length) + ' 张</span></div>',
          '<div class="upload-preview-list">',
          state.publishImages.map(function (image, index) {
            return [
              '<div class="upload-preview-item">',
              '<img src="' + escapeHTML(image.url) + '" alt="' + escapeHTML(image.name || "已上传图片") + '">',
              '<button class="upload-remove" type="button" data-remove-image-index="' + index + '" aria-label="移除图片">' + icon("x") + '</button>',
              '<span class="upload-name">' + escapeHTML(image.name || "图片") + '</span>',
              '</div>'
            ].join("");
          }).join(""),
          '</div>'
        ].join("");
      }

      function renderAuth(mode) {
        var isLogin = mode === "login";
        return [
          '<section class="auth-page">',
          '<div class="auth-head">',
          '<p class="section-kicker">' + (isLogin ? "Login" : "Join") + '</p>',
          '<h1 class="section-title">' + (isLogin ? "登录账号" : "注册账号") + '</h1>',
          '<p class="section-desc">' + (isLogin ? "登录后可以发帖、评论和投票。" : "创建账号后加入 YXB GameBase。") + '</p>',
          '</div>',
          '<form class="auth-body" id="' + (isLogin ? "login-form" : "signup-form") + '">',
          '<div class="form-grid">',
          '<div class="field"><label for="auth-username">用户名</label><input id="auth-username" required autocomplete="username"></div>',
          '<div class="field"><label for="auth-password">密码</label><input id="auth-password" type="password" required autocomplete="' + (isLogin ? "current-password" : "new-password") + '"></div>',
          isLogin ? '' : '<div class="field"><label for="auth-repassword">确认密码</label><input id="auth-repassword" type="password" required autocomplete="new-password"></div>',
          '</div>',
          '<div class="form-actions">',
          '<button class="btn" type="button" data-action="' + (isLogin ? "signup" : "login") + '">' + (isLogin ? "去注册" : "去登录") + '</button>',
          '<button class="btn btn-primary" type="submit">' + (isLogin ? "登录" : "注册") + '</button>',
          '</div>',
          '</form>',
          '</section>'
        ].join("");
      }

      function bindEvents() {
        app.querySelectorAll("[data-action]").forEach(function (el) {
          el.addEventListener("click", handleAction);
        });
        app.querySelectorAll("[data-community-id]").forEach(function (el) {
          el.addEventListener("click", function () {
            state.selectedCommunityID = normalizeID(el.getAttribute("data-community-id"));
            navigate("/");
          });
        });
        app.querySelectorAll("[data-order]").forEach(function (el) {
          el.addEventListener("click", function () {
            state.order = el.getAttribute("data-order") || "time";
            loadPosts();
          });
        });
        app.querySelectorAll("[data-open-post]").forEach(function (el) {
          el.addEventListener("click", function () {
            navigate("/post/" + encodeURIComponent(el.getAttribute("data-open-post")));
          });
        });
        app.querySelectorAll("[data-scroll-target]").forEach(function (el) {
          el.addEventListener("click", function () {
            var target = document.getElementById(el.getAttribute("data-scroll-target"));
            if (target) {
              target.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
        });
        app.querySelectorAll("[data-vote]").forEach(function (el) {
          el.addEventListener("click", function () {
            vote(el.getAttribute("data-post-id"), Number(el.getAttribute("data-vote")));
          });
        });
        app.querySelectorAll("[data-remove-image-index]").forEach(function (el) {
          el.addEventListener("click", function () {
            removePublishImage(Number(el.getAttribute("data-remove-image-index")));
          });
        });

        var search = document.getElementById("global-search");
        if (search) {
          search.addEventListener("compositionstart", function () {
            state.searchComposing = true;
          });
          search.addEventListener("compositionend", function () {
            state.searchComposing = false;
            state.query = search.value;
            render();
            focusSearchAtEnd();
          });
          search.addEventListener("input", function () {
            state.query = search.value;
            if (state.searchComposing) {
              return;
            }
            render();
            focusSearchAtEnd();
          });
        }

        var publishForm = document.getElementById("publish-form");
        if (publishForm) {
          publishForm.addEventListener("submit", submitPost);
        }
        var loginForm = document.getElementById("login-form");
        if (loginForm) {
          loginForm.addEventListener("submit", submitLogin);
        }
        var signupForm = document.getElementById("signup-form");
        if (signupForm) {
          signupForm.addEventListener("submit", submitSignup);
        }
        var imageInput = document.getElementById("publish-image");
        if (imageInput) {
          imageInput.addEventListener("change", uploadPublishImage);
        }
      }

      function handleAction(event) {
        var action = event.currentTarget.getAttribute("data-action");
        if (action === "home") {
          navigate("/");
        } else if (action === "publish") {
          navigate("/publish");
        } else if (action === "login") {
          navigate("/login");
        } else if (action === "signup") {
          navigate("/signup");
        } else if (action === "logout") {
          logout();
        } else if (action === "comment") {
          submitComment();
        } else if (action === "delete-post") {
          deletePost(event.currentTarget.getAttribute("data-post-id"));
        } else if (action === "ask") {
          askAssistant();
        } else if (action === "choose-image") {
          var imageInput = document.getElementById("publish-image");
          if (imageInput) {
            imageInput.click();
          }
        }
      }

      function loadCommunities() {
        return requestJSON("/community")
          .then(function (data) {
            state.communities = (data && data.length ? data : DEFAULT_DOMAINS).map(function (item) {
              return {
                id: normalizeID(item.id),
                name: item.name,
                introduction: item.introduction || ""
              };
            }).sort(sortCommunities);
          })
          .catch(function () {
            state.communities = DEFAULT_DOMAINS.slice();
          });
      }

      function sortCommunities(a, b) {
        var order = {
          "LOL": 1,
          "英雄联盟": 1,
          "云顶之弈": 2,
          "云顶之奕": 2,
          "TFT": 2,
          "金铲铲": 2,
          "CF": 3,
          "穿越火线": 3,
          "力扣": 4,
          "leetcode": 4,
          "LeetCode": 4
        };
        var left = order[a.name] || 99;
        var right = order[b.name] || 99;
        if (left !== right) {
          return left - right;
        }
        return normalizeID(a.id) - normalizeID(b.id);
      }

      function loadPosts() {
        state.loading = true;
        render();
        var params = new URLSearchParams({
          page: "1",
          size: "30",
          order: state.order
        });
        if (state.selectedCommunityID) {
          params.set("community_id", String(state.selectedCommunityID));
        }
        return requestJSON("/posts2?" + params.toString())
          .then(function (data) {
            state.posts = data || [];
          })
          .catch(function (err) {
            state.posts = [];
            toast(err.message || "加载帖子失败");
          })
          .finally(function () {
            state.loading = false;
            render();
          });
      }

      function loadDetail(id) {
        state.loading = true;
        state.post = null;
        state.comments = [];
        render();
        requestJSON("/post/" + encodeURIComponent(id))
          .then(function (data) {
            state.post = data;
            return requestJSON("/post/" + encodeURIComponent(id) + "/comments");
          })
          .then(function (comments) {
            state.comments = comments || [];
          })
          .catch(function (err) {
            toast(err.message || "加载详情失败");
          })
          .finally(function () {
            state.loading = false;
            render();
          });
      }

      function loadRouteData() {
        if (state.route.name === "home") {
          loadPosts();
        } else if (state.route.name === "detail") {
          loadDetail(state.route.id);
        }
      }

      function vote(postID, direction) {
        if (!(state.auth && state.auth.token)) {
          toast("请先登录后再投票");
          navigate("/login");
          return;
        }
        requestJSON("/vote", {
          method: "POST",
          body: JSON.stringify({ post_id: String(postID), direction: String(direction) })
        }).then(function () {
          toast("投票已更新");
          if (state.route.name === "detail") {
            loadDetail(postID);
          } else {
            loadPosts();
          }
        }).catch(function (err) {
          toast(err.message || "投票失败");
        });
      }

      function submitPost(event) {
        event.preventDefault();
        var communityID = normalizeID(document.getElementById("publish-community").value);
        var title = document.getElementById("publish-title").value.trim();
        var textContent = document.getElementById("publish-content").value.trim();
        var content = buildPostContent(textContent);
        if (!communityID || !title || !content) {
          toast("请完整填写领域、标题和内容，或至少上传一张图片");
          return;
        }
        requestJSON("/post", {
          method: "POST",
          body: JSON.stringify({ community_id: communityID, title: title, content: content })
        }).then(function () {
          state.selectedCommunityID = communityID;
          state.publishImages = [];
          toast("帖子已发布");
          navigate("/");
        }).catch(function (err) {
          toast(err.message || "发布失败");
        });
      }

      function uploadPublishImage(event) {
        var input = event.currentTarget;
        var file = input.files && input.files[0];
        if (!file) {
          return;
        }
        if (!/^image\/(jpeg|png|webp|gif)$/.test(file.type)) {
          toast("仅支持 jpg、png、webp、gif 图片");
          input.value = "";
          return;
        }
        var form = new FormData();
        form.append("image", file);
        toast("正在上传图片...");
        fetch(API + "/upload/image", {
          method: "POST",
          headers: authTokenHeader(),
          body: form
        })
          .then(function (resp) { return resp.json(); })
          .then(function (payload) {
            if (!payload || payload.code !== 1000) {
              throw new Error(payload && payload.msg ? formatMsg(payload.msg) : "上传失败");
            }
            addPublishImage(payload.data && payload.data.url, file.name);
            toast("图片已上传");
          })
          .catch(function (err) {
            toast(err.message || "上传失败");
          })
          .finally(function () {
            input.value = "";
          });
      }

      function authTokenHeader() {
        var headers = {};
        if (state.auth && state.auth.token) {
          headers.Authorization = "Bearer " + state.auth.token;
        }
        return headers;
      }

      function addPublishImage(url, name) {
        if (!url) {
          return;
        }
        state.publishImages.push({
          url: url,
          name: cleanImageName(name)
        });
        refreshPublishImagePreview();
      }

      function removePublishImage(index) {
        if (index < 0 || index >= state.publishImages.length) {
          return;
        }
        state.publishImages.splice(index, 1);
        refreshPublishImagePreview();
      }

      function refreshPublishImagePreview() {
        var preview = document.getElementById("publish-image-preview");
        if (!preview) {
          return;
        }
        preview.innerHTML = renderPublishImagePreviewContent();
        preview.querySelectorAll("[data-remove-image-index]").forEach(function (el) {
          el.addEventListener("click", function () {
            removePublishImage(Number(el.getAttribute("data-remove-image-index")));
          });
        });
      }

      function buildPostContent(textContent) {
        var imageContent = state.publishImages.map(function (image) {
          return formatImageMarkdown(image);
        }).join("\n");
        return [textContent, imageContent].filter(Boolean).join("\n\n").trim();
      }

      function formatImageMarkdown(image) {
        if (!(image && image.url)) {
          return "";
        }
        return "![图片-" + cleanImageName(image.name) + "](" + image.url + ")";
      }

      function cleanImageName(name) {
        var label = String(name || "图片").replace(/\.[^.]+$/, "") || "图片";
        return label.replace(/[\[\]\n\r]/g, "").trim() || "图片";
      }

      function focusSearchAtEnd() {
        requestAnimationFrame(function () {
          var nextSearch = document.getElementById("global-search");
          if (!nextSearch) {
            return;
          }
          nextSearch.focus();
          var end = nextSearch.value.length;
          if (typeof nextSearch.setSelectionRange === "function") {
            nextSearch.setSelectionRange(end, end);
          }
        });
      }

      function submitLogin(event) {
        event.preventDefault();
        var username = document.getElementById("auth-username").value.trim();
        var password = document.getElementById("auth-password").value;
        requestJSON("/login", {
          method: "POST",
          body: JSON.stringify({ username: username, password: password })
        }).then(function (data) {
          setLogin(data);
          toast("登录成功");
          navigate("/");
        }).catch(function (err) {
          toast(err.message || "登录失败");
        });
      }

      function submitSignup(event) {
        event.preventDefault();
        var username = document.getElementById("auth-username").value.trim();
        var password = document.getElementById("auth-password").value;
        var rePassword = document.getElementById("auth-repassword").value;
        requestJSON("/signup", {
          method: "POST",
          body: JSON.stringify({ username: username, password: password, re_password: rePassword })
        }).then(function () {
          toast("注册成功，请登录");
          navigate("/login");
        }).catch(function (err) {
          toast(err.message || "注册失败");
        });
      }

      function submitComment() {
        if (!(state.post && state.post.id)) {
          return;
        }
        var input = document.getElementById("comment-input");
        var content = input ? input.value.trim() : "";
        if (!content) {
          toast("评论内容不能为空");
          return;
        }
        requestJSON("/comment", {
          method: "POST",
          body: JSON.stringify({ post_id: String(state.post.id), content: content })
        }).then(function () {
          toast("评论已发布");
          loadDetail(state.post.id);
        }).catch(function (err) {
          toast(err.message || "评论失败");
        });
      }

      function deletePost(postID) {
        if (!window.confirm("确认删除这篇帖子吗？")) {
          return;
        }
        requestJSON("/post/" + encodeURIComponent(postID), { method: "DELETE" })
          .then(function () {
            toast("帖子已删除");
            navigate("/");
          })
          .catch(function (err) {
            toast(err.message || "删除失败");
          });
      }

      function askAssistant() {
        var input = document.getElementById("assistant-input");
        var question = input ? input.value.trim() : "";
        if (!question) {
          toast("请输入问题");
          return;
        }
        state.assistantAnswer = "正在检索知识库...";
        render();
        fetch(API + "/rag/chat/stream", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ question: question, top_k: 4 })
        }).then(function (resp) {
          if (!resp.ok || !resp.body) {
            throw new Error("问答服务暂不可用");
          }
          var reader = resp.body.getReader();
          var decoder = new TextDecoder("utf-8");
          var buffer = "";
          state.assistantAnswer = "";
          function read() {
            return reader.read().then(function (result) {
              if (result.done) {
                render();
                return;
              }
              buffer += decoder.decode(result.value, { stream: true });
              var parts = buffer.split("\n\n");
              buffer = parts.pop() || "";
              parts.forEach(handleSSEBlock);
              read();
            });
          }
          return read();
        }).catch(function (err) {
          state.assistantAnswer = err.message || "问答失败";
          render();
        });
      }

      function handleSSEBlock(block) {
        var event = "";
        var data = "";
        block.split("\n").forEach(function (line) {
          if (line.indexOf("event:") === 0) {
            event = line.slice(6).trim();
          } else if (line.indexOf("data:") === 0) {
            data += line.slice(5).trim();
          }
        });
        if (!data) {
          return;
        }
        try {
          var payload = JSON.parse(data);
          if (event === "chunk" && payload.delta) {
            state.assistantAnswer += payload.delta;
            var output = document.getElementById("assistant-output");
            if (output) {
              output.textContent = state.assistantAnswer;
              output.scrollTop = output.scrollHeight;
            }
          } else if (event === "error") {
            state.assistantAnswer = payload.message || "问答失败";
          } else if (event === "done" && payload.answer) {
            state.assistantAnswer = payload.answer;
          }
        } catch (err) {
          return;
        }
      }

      window.addEventListener("popstate", function () {
        state.route = parseRoute();
        if (state.route.name !== "publish") {
          state.publishImages = [];
        }
        render();
        loadRouteData();
      });

      loadCommunities().then(function () {
        render();
        loadRouteData();
      });
    })();
  </script>
</body>
</html>
